<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутая Раскраска</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            user-select: none; /* Чтобы ребенок случайно не выделял текст */
        }
        h1 {
            color: #4a4a4a;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-top: 0;
        }
        
        /* Расширенная палитра */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto 25px auto;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .color-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.15);
            border-color: #4a4a4a;
        }

        /* Контейнер для холста */
        .canvas-container {
            background: white;
            padding: 15px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            line-height: 0; /* Убирает лишние отступы под SVG */
        }

        /* Стили для SVG рисунка */
        svg {
            max-width: 100%;
            width: 450px;
            height: 450px;
            border-radius: 15px;
        }
        
        /* Интерактивные элементы для покраски */
        .paintable {
            fill: #ffffff; /* Начальный цвет — белый */
            stroke: #2c3e50; /* Красивый темно-синий контур вместо черного */
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
            transition: fill 0.25s ease;
        }
        /* Эффект легкого подсвечивания при наведении, чтобы ребенок видел, куда кликает */
        .paintable:hover {
            filter: brightness(0.95);
        }
    </style>
</head>
