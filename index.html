<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебное приключение</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffe6f2 0%, #b3dbff 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            user-select: none;
            overflow: hidden;
            position: relative;
        }
        
        /* Летающие сердечки - ТЕПЕРЬ ПОВЕРХ ВСЕГО */
        .heart {
            position: absolute;
            cursor: pointer;
            z-index: 9999; /* Самый высокий приоритет, чтобы быть над кнопками */
            font-size: 40px;
            animation: floatUp 5s linear infinite;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
            /* Делаем область клика чуть больше, чтобы ребёнку было легче попасть */
            padding: 10px; 
            touch-action: manipulation;
        }
        
        /* Эффект при клике / тапе (лопанье) */
        .heart.pop {
            transform: scale(1.6);
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0.8) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(20deg);
                opacity: 0;
            }
        }

        #game-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 35px 25px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(8px);
            z-index: 10;
            border: 3px solid #fff;
        }
        #text {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 35px;
            line-height: 1.4;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

            background: #ff6b8b;
            color: white;
            border: none;
            padding: 22px;
            font-size: 24px;
            border-radius: 22px;
