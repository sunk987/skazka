<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Раскраска</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        
        /* Палитра */
        .palette {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.15);
            border-color: #333;
        }

        /* Контейнер для картинки */
        .canvas-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Стили для SVG (картинки) */
        svg {
            max-width: 100%;
            height: auto;
        }
        /* Элементы, которые можно красить, должны иметь этот класс */
        .paintable {
            fill: #ffffff;
            stroke: #000000;
            stroke-width: 2;
            cursor: pointer;
            transition: fill 0.3s;
        }
    </style>
</head>
<body>

    <h1>🎨 Моя первая раскраска 🖌️</h1>

    <!-- Палитра цветов -->
    <div class="palette">
        <div class="color-circle active" style="background: #ff4d4d;" data-color="#ff4d4d"></div>
        <div class="color-circle" style="background: #4da6ff;" data-color="#4da6ff"></div>
        <div class="color-circle" style="background: #ffff4d;" data-color="#ffff4d"></div>
        <div class="color-circle" style="background: #5cd65c;" data-color="#5cd65c"></div>
        <div class="color-circle" style="background: #ff944d;" data-color="#ff944d"></div>
        <div class="color-circle" style="background: #b366ff;" data-color="#b366ff"></div>
        <div class="color-circle" style="background: #ffffff;" data-color="#ffffff"></div> <!-- Стиралка -->
    </div>

    <!-- Контейнер с векторной картинкой (сейчас тут простой домик) -->
    <div class="canvas-container">
        <svg width="400" height="400" viewBox="0 0 400 400">
            <!-- Небо / Фон (не красится) -->
            <rect width="400" height="400" fill="#fafafa" stroke="#ccc"/>
            
            <!-- Крыша (красится) -->
            <polygon points="200,50 50,180 350,180" class="paintable" />
            
            <!-- Стены дома (красится) -->
            <rect x="80" y="180" width="240" height="170" class="paintable" />
            
            <!-- Окно (красится) -->
            <rect x="150" y="220" width="100" height="80" class="paintable" />
            
            <!-- Труба (красится) -->
            <polygon points="280,75 280,120 310,120 310,100" class="paintable" />
        </svg>
    </div>

    <script>
        // Текущий выбранный цвет (по умолчанию красный)
        let selectedColor = '#ff4d4d';

        // Выбор цвета в палитре
        const colorCircles = document.querySelectorAll('.color-circle');
        colorCircles.forEach(circle => {
            circle.addEventListener('click', (e) => {
                // Убираем активный класс у всех
                colorCircles.forEach(c => c.classList.remove('active'));
                // Добавляем текущему
                e.target.classList.add('active');
                // Меняем цвет
                selectedColor = e.target.getAttribute('data-color');
            });
        });

        // Раскрашивание элементов
        const paintableElements = document.querySelectorAll('.paintable');
        paintableElements.forEach(element => {
            element.addEventListener('click', (e) => {
                e.target.style.fill = selectedColor;
            });
        });
    </script>

</body>
</html>
