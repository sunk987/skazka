<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебное приключение</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            user-select: none;
            overflow: hidden;
            position: relative;
        }
        /* Волшебные звёздочки на фоне */
        .star {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            animation: floatAnimation 6s linear infinite;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.2s;
        }
        .star:active {
            transform: scale(0);
        }
        @keyframes floatAnimation {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-5vh) rotate(360deg);
                opacity: 0;
            }
        }
        #game-container {
            background: rgba(255, 255, 255, 0.92);
            padding: 35px 25px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(5px);
            z-index: 10;
            border: 3px solid #fff;
        }
        #text {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 35px;
            line-height: 1.4;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .btn {
            background: #ff6b8b;
            color: white;
            border: none;
            padding: 22px;
            font-size: 24px;
            border-radius: 22px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 8px 20px rgba(255, 107, 139, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: bold;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-blue {
            background: #4dadf7;
            box-shadow: 0 8px 20px rgba(77, 173, 247, 0.35);
        }
        #restart-btn {
            background: #66bb6a;
            font-size: 22px;
            margin-top: 25px;
            display: none;
            box-shadow: 0 8px 20px rgba(102, 187, 106, 0.4);
            width: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="text">Загрузка сказки...</div>
    <div class="btn-container" id="choices"></div>
    <button class="btn" id="restart-btn" onclick="startGame()">✨ Играть снова</button>
</div>

<script>
    const story = {
        start: {
            text: "🐕 Маноэль нашёл золотой ключ! Куда мы пойдём?",
            choices: [
                { text: "🌲 В сказочный лес", next: "forest", icon: "🌲" },
                { text: "🏰 К большому замку", next: "castle", icon: "🏰" }
            ]
        },
        forest: {
            text: "🪄 В лесу танцует добрая Фея!",
            choices: [
                { text: "💃 Потанцевать с ней", next: "river", icon: "💃" },
                { text: "🍎 Дать ей яблоко", next: "river", icon: "🍎" }
            ]
        },
        castle: {
            text: "🚗 У замка стоит Заяц на машинке!",
            choices: [
                { text: "🚙 Поехать с ним", next: "river", icon: "🚙" },
                { text: "🥕 Дать ему морковку", next: "river", icon: "🥕" }
            ]
        },
        river: {
            text: "🌊 Впереди большая река! Как пройти?",
            choices: [
                { text: "🪵 Построить мостик", next: "final", icon: "🪵" },
                { text: "🛶 Плыть на лодке", next: "final", icon: "🛶" }
            ]
        },
        final: {
            text: "🎉 Ура! Ключ подошёл! Шкатулка открылась! Ты победила! 🎁",
            choices: []
        }
    };

    function startGame() {
        document.getElementById('restart-btn').style.display = 'none';
        showNode('start');
    }

    function showNode(nodeId) {
        const node = story[nodeId];
        document.getElementById('text').innerText = node.text;
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = '';

        if (node.choices.length === 0) {
            document.getElementById('restart-btn').style.display = 'block';
            return;
        }

        node.choices.forEach((choice, index) => {
            const button = document.createElement('button');
            button.className = `btn ${index % 2 === 1 ? 'btn-blue' : ''}`;
            button.innerHTML = `<span>${choice.icon}</span> ${choice.text}`;
            button.onclick = () => showNode(choice.next);
            choicesContainer.appendChild(button);
        });
    }

    // Функция создания летающих звёзд
    function createStars() {
        const icons = ['✨', '⭐', '🌸', '🎈'];
        setInterval(() => {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerText = icons[Math.floor(Math.random() * icons.length)];
            star.style.left = Math.random() * 100 + 'vw';
            // Случайный размер и скорость анимации
            const size = Math.random() * 20 + 20;
            star.style.fontSize = size + 'px';
            star.style.animationDuration = (Math.random() * 4 + 5) + 's';
            
            document.body.appendChild(star);
            
            // Удаляем звезду после окончания анимации
            setTimeout(() => {
                star.remove();
            }, 9000);
        }, 600);
    }

    startGame();
    createStars();
</script>

</body>
</html>
