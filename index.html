<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Волшебная Раскраска: Космические Миссии</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .header-area {
            width: 100%;
            margin-bottom: 5px;
            z-index: 10;
        }
        h1 { font-size: 20px; color: #333; margin: 5px 0 2px 0; }
        p { font-size: 13px; color: #666; margin: 0 0 5px 0; }
        
        #score-counter {
            font-size: 18px;
            font-weight: bold;
            color: #ff4d6d;
            background: white;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 5px 0;
            display: none;
        }

        /* Палитра */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            z-index: 10;
        }
        .color-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .color-circle.active {
            transform: scale(1.1);
            border-color: #333;
        }

        /* Холст раскрасок */
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            width: 300px;
            height: 300px;
        }
        @media (min-height: 600px) { .canvas-container { width: 340px; height: 340px; } }
        @media (min-height: 700px) { .canvas-container { width: 380px; height: 380px; } }

        svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
        }
        
        .paintable {
            fill: #ffffff;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            cursor: pointer;
        }

        /* Анимации исчезновения */
        #the-cat {
            transition: transform 2.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s ease;
            transform-origin: bottom center;
        }
        .cat-walks-away { transform: translateX(450px) scale(0.6); opacity: 0; pointer-events: none; }

        #the-rocket {
            transition: transform 2s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 1.5s ease;
            transform-origin: center center;
        }
        .rocket-flies-away { transform: translateY(-600px) scale(0.5); opacity: 0; pointer-events: none; }

        #level-2, #level-3 { display: none; }

        /* ИГРА 1: СЕРДЕЧКИ */
        .flying-object {
            position: absolute; cursor: pointer; bottom: -80px; z-index: 5;
            animation: flyUp 4s linear forwards;
        }
        .heart { width: 55px; height: 55px; }
        .heart::before, .heart::after {
            content: ""; position: absolute; top: 0; width: 28px; height: 45px;
            border-radius: 28px 28px 0 0; background: var(--obj-color);
        }
        .heart::before { left: 28px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
        .star { width: 50px; height: 50px; }

        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-50vh) translateX(25px) rotate(8deg); }
            100% { transform: translateY(-120vh) translateX(-25px) rotate(-8deg); }
        }

        /* Частицы взрыва (маленькие звёздочки) */
        .particle {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 6;
            animation: explodeParticle 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes explodeParticle {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0) rotate(180deg); opacity: 0; }
        }

        /* ИГРА 2: ЛЯГУШКА / МАГНИТ — Подняли повыше от края экрана */
        #ufo-catcher {
            position: absolute; width: 80px; height: 50px;
            bottom: 120px; left: calc(50% - 40px); z-index: 99;
            display: none; pointer-events: none;
        }
        .asteroid {
            position: absolute; width: 40px; height: 40px; z-index: 98;
            animation: fallDown 3.5s linear forwards;
        }
        @keyframes fallDown {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 id="game-title">🐱 Уровень 1: Волшебный Кот 🎨</h1>
        <p id="game-instruction">Раскрась котика полностью, чтобы открыть секретную игру!</p>
        <div id="score-counter">Поймано: <span id="score">0</span> / 50</div>
    </div>

    <div class="palette" id="main-palette">
        <div class="color-circle active" style="background: #ff4d6d;" data-color="#ff4d6d"></div>
        <div class="color-circle" style="background: #ff758f;" data-color="#ff758f"></div>
        <div class="color-circle" style="background: #ff9f1c;" data-color="#ff9f1c"></div>
        <div class="color-circle" style="background: #ffeb3b;" data-color="#ffeb3b"></div>
        <div class="color-circle" style="background: #4ecc6e;" data-color="#4ecc6e"></div>
        <div class="color-circle" style="background: #20b2aa;" data-color="#20b2aa"></div>
        <div class="color-circle" style="background: #00b4d8;" data-color="#00b4d8"></div>
        <div class="color-circle" style="background: #0077b6;" data-color="#0077b6"></div>
        <div class="color-circle" style="background: #7209b7;" data-color="#7209b7"></div>
        <div class="color-circle" style="background: #b5179e;" data-color="#b5179e"></div>
        <div class="color-circle" style="background: #d4a373;" data-color="#d4a373"></div>
        <div class="color-circle" style="background: #4a4a4a;" data-color="#4a4a4a"></div>
        <div class="color-circle" style="background: #ffffff; border: 3px solid #ccc;" data-color="#ffffff"></div>
    </div>

    <div class="canvas-container" id="painting-canvas">
        
        <svg viewBox="0 0 400 400" id="level-1">
            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <polygon points="60,50 65,65 80,65 67,75 72,90 60,80 48,90 53,75 40,65 55,65" class="paintable" />
            <polygon points="320,50 323,60 335,60 325,67 328,78 320,70 312,78 315,67 305,60 317,60" class="paintable" />
            <polygon points="70,160 73,168 81,168 74,173 76,182 70,176 64,182 66,173 59,168 67,168" class="paintable" />
            <circle cx="230" cy="100" r="45" class="paintable" />
            <circle cx="210" cy="85" r="7" class="paintable" />
            <circle cx="245" cy="115" r="9" class="paintable" />
            <rect x="0" y="320" width="400" height="80" class="paintable" />
            
            <g id="the-cat">
                <path d="M 130 320 C 100 320, 80 270, 100 240 C 110 230, 120 240, 115 255 C 105 275, 120 300, 145 305 Z" class="paintable cat-part" />
                <ellipse cx="180" cy="260" rx="45" ry="60" class="paintable cat-part" />
                <polygon points="145,140 130,90 165,125" class="paintable cat-part" />
                <polygon points="215,140 230,90 195,125" class="paintable cat-part" />
                <circle cx="180" cy="160" r="40" class="paintable cat-part" />
                <circle cx="165" cy="155" r="5" fill="#2c3e50" />
                <circle cx="195" cy="155" r="5" fill="#2c3e50" />
                <polygon points="180,165 176,170 184,170" fill="#ff758f" />
            </g>
        </svg>

        <svg viewBox="0 0 400 400" id="level-2">
            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <circle cx="70" cy="80" r="35" class="paintable" />
            <path d="M 30 85 Q 70 105 110 85" fill="none" stroke="#2c3e50" stroke-width="3" />
            <circle cx="330" cy="300" r="25" class="paintable" />
            <polygon points="320,70 323,77 332,77 325,82 327,90 320,85 313,90 315,82 308,77 317,77" class="paintable" />
            <polygon points="80,280 83,287 92,287 85,292 87,300 80,295 73,300 75,292 68,287 77,287" class="paintable" />
            
            <g id="the-rocket">
                <path d="M 200 80 C 230 140, 240 240, 240 280 L 160 280 C 160 240, 170 140, 200 80 Z" class="paintable rocket-part" />
                <circle cx="200" cy="180" r="22" class="paintable rocket-part" />
                <path d="M 160 240 L 120 280 L 160 280 Z" class="paintable rocket-part" />
                <path d="M 240 240 L 280 280 L 240 280 Z" class="paintable rocket-part" />
                <polygon points="180,285 200,330 220,285 210,300 200,285 190,300" class="paintable rocket-part" />
            </g>
        </svg>

        <svg viewBox="0 0 400 400" id="level-3">
            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <ellipse cx="200" cy="380" rx="250" ry="50" class="paintable" /> 
            <ellipse cx="70" cy="360" rx="20" ry="8" class="paintable" /> 
            <ellipse cx="320" cy="370" rx="30" ry="10" class="paintable" /> 
            
            <path d="M 120 310 Q 200 280 280 310 Q 200 340 120 310 Z" class="paintable" />
            <path d="M 150 300 C 150 260, 250 260, 250 300 Z" class="paintable" opacity="0.5"/> 

            <g id="the-alien">
                <ellipse cx="200" cy="220" rx="35" ry="45" class="paintable alien-part" />
                <path d="M 165 220 Q 130 200 140 180" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
                <path d="M 235 220 Q 270 200 260 180" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
                <circle cx="140" cy="180" r="6" class="paintable alien-part" />
                <circle cx="260" cy="180" r="6" class="paintable alien-part" />
                <ellipse cx="200" cy="140" rx="50" ry="35" class="paintable alien-part" />
                <circle cx="170" cy="135" r="10" class="paintable alien-part" />
                <circle cx="170" cy="135" r="4" fill="#2c3e50" />
                <circle cx="200" cy="130" r="11" class="paintable alien-part" />
                <circle cx="200" cy="130" r="4" fill="#2c3e50" />
                <circle cx="230" cy="135" r="10" class="paintable alien-part" />
                <circle cx="230" cy="135" r="4" fill="#2c3e50" />
                <path d="M 185 160 Q 200 172 215 160" fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" />
            </g>
        </svg>

    </div>

    <div id="ufo-catcher">
        <svg viewBox="0 0 100 60" width="100%" height="100%">
            <path d="M 15 40 Q 50 15 85 40 Q 50 60 15 40 Z" fill="#00b4d8" stroke="#fff" stroke-width="2"/>
            <path d="M 30 35 C 30 15, 70 15, 70 35 Z" fill="#fff" opacity="0.6" stroke="#fff" stroke-width="1"/>
            <circle cx="50" cy="45" r="4" fill="#ffeb3b"/>
            <circle cx="30" cy="42" r="3" fill="#ff4d6d"/>
            <circle cx="70" cy="42" r="3" fill="#4ecc6e"/>
        </svg>
    </div>

    <script>
        let selectedColor = '#ff4d6d';
        let gameActive = false;
        let objectInterval;
        let score = 0;
        let currentLevel = 1;

        document.addEventListener("DOMContentLoaded", () => {
            initPalette();
            initPainting();
        });

        function initPalette() {
            const colorCircles = document.querySelectorAll('.color-circle');
            colorCircles.forEach(circle => {
                circle.addEventListener('click', (e) => {
                    colorCircles.forEach(c => c.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    selectedColor = e.currentTarget.getAttribute('data-color');
                });
            });
        }

        function initPainting() {
            const paintableElements = document.querySelectorAll('.paintable');
            paintableElements.forEach(element => {
                element.removeEventListener('click', handlePaint);
                element.addEventListener('click', handlePaint);
            });
        }

        function handlePaint(e) {
            e.target.style.fill = selectedColor;
            
            if (currentLevel === 1 && e.target.classList.contains('cat-part')) {
                checkCatStatus();
            } else if (currentLevel === 2 && e.target.classList.contains('rocket-part')) {
                checkRocketStatus();
            } else if (currentLevel === 3 && e.target.classList.contains('alien-part')) {
                checkAlienStatus();
            }
        }

        function checkCatStatus() {
            const catParts = document.querySelectorAll('.cat-part');
            let allPainted = true;
            catParts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') allPainted = false;
            });

            if (allPainted) {
                setTimeout(() => {
                    document.getElementById('the-cat').classList.add('cat-walks-away');
                    setTimeout(startHeartGame, 2000);
                }, 300);
            }
        }

        function checkRocketStatus() {
            const rocketParts = document.querySelectorAll('.rocket-part');
            let allPainted = true;
            rocketParts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') allPainted = false;
            });

            if (allPainted) {
                setTimeout(() => {
                    document.getElementById('the-rocket').classList.add('rocket-flies-away');
                    setTimeout(startUfoGame, 2000); 
                }, 300);
            }
        }

        function checkAlienStatus() {
            const alienParts = document.querySelectorAll('.alien-part');
            let allPainted = true;
            alienParts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') allPainted = false;
            });

            if (allPainted) {
                setTimeout(() => {
                    document.getElementById('game-title').innerHTML = "👑 ВСЕЛЕННАЯ ОТКРЫТА! 👑";
                    document.getElementById('game-instruction').innerHTML = "Ты раскрасил всех героев! Ты супер-художник! 🛸🌟";
                }, 300);
            }
        }

        // МИНИ-ИГРА 1: СЕРДЕЧКИ
        function startHeartGame() {
            gameActive = true;
            score = 0;
            document.getElementById('score-counter').innerHTML = "Поймано предметов: <span id='score'>0</span> / 50";
            document.getElementById('game-title').innerHTML = "❤️ Поймай 50 звёзд и сердечек! ✨";
            document.getElementById('game-instruction').innerHTML = "Тапай прямо по летящим предметам!";
            
            document.getElementById('score-counter').style.display = 'inline-block';
            document.getElementById('main-palette').style.display = 'none';
            document.getElementById('painting-canvas').style.opacity = '0';
            
            setTimeout(() => { document.getElementById('level-1').style.display = 'none'; }, 500);
            objectInterval = setInterval(createFlyingObject, 350);
        }

        // Создание эффекта взрыва (разлетающиеся звёздочки)
        function createExplosion(x, y) {
            const particleCount = 6;
            const colors = ['#ff4d6d', '#ff758f', '#ffeb3b', '#ff9f1c', '#00b4d8', '#4ecc6e'];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Рисуем маленькую звёздочку внутри частицы
                const randColor = colors[Math.floor(Math.random() * colors.length)];
                particle.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="${randColor}"/></svg>`;
                
                // Позиционируем в месте клика
                particle.style.left = (x - 10) + 'px';
                particle.style.top = (y - 10) + 'px';
                
                // Генерируем случайное направление разлёта (в радиусе 80-130px)
                const angle = (i * (360 / particleCount) + Math.random() * 30) * (Math.PI / 180);
                const distance = Math.floor(Math.random() * 50) + 80;
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance;
                
                particle.style.setProperty('--mx', `${mx}px`);
                particle.style.setProperty('--my', `${my}px`);
                
                document.body.appendChild(particle);
                
                // Удаляем звёздочку после окончания анимации
                particle.addEventListener('animationend', () => particle.remove());
            }
        }

        function createFlyingObject() {
            if (!gameActive) return;

            const isStar = Math.random() > 0.5;
            const obj = document.createElement('div');
            obj.classList.add('flying-object');

            const colors = ['#ff4d6d', '#ff758f', '#ffeb3b', '#ff9f1c', '#ba55d3', '#00b4d8', '#4ecc6e'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            if (isStar) {
                obj.classList.add('star');
                obj.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="${randomColor}" stroke="#fff" stroke-width="1"/></svg>`;
            } else {
                obj.classList.add('heart');
                obj.style.setProperty('--obj-color', randomColor);
            }

            obj.style.left = Math.floor(Math.random() * 80) + 5 + '%';
            obj.style.transform = `scale(${(Math.random() * 0.4) + 0.7})`;
            obj.style.animationDuration = (Math.random() * 1.5) + 2.3 + 's';

            const popEvent = (e) => {
                e.preventDefault();
                
                // Получаем координаты клика/тапа для красивого взрыва
                const rect = obj.getBoundingClientRect();
                const clickX = rect.left + rect.width / 2;
                const clickY = rect.top + rect.height / 2;
                
                // Запуск взрыва частиц
                createExplosion(clickX, clickY);

                obj.remove();
                score++;
                document.getElementById('score').innerText = score;

                if (score >= 50 && gameActive) {
                    endHeartGame();
                }
            };

            obj.addEventListener('click', popEvent);
            obj.addEventListener('touchstart', popEvent, {passive: false});
            obj.addEventListener('animationend', () => { obj.remove(); });
            document.body.appendChild(obj);
        }

        function endHeartGame() {
            gameActive = false;
            currentLevel = 2;
            clearInterval(objectInterval);
            document.querySelectorAll('.flying-object').forEach(o => o.remove());

            document.getElementById('game-title').innerHTML = "🚀 Уровень 2: Ракета! 🌟";
            document.getElementById('game-instruction').innerHTML = "Раскрась ракету, чтобы отправить её в космос!";
            document.getElementById('score-counter').style.display = 'none';
            
            document.getElementById('level-2').style.display = 'block';
            document.getElementById('main-palette').style.display = 'flex';
            document.getElementById('painting-canvas').style.opacity = '1';
            
            initPainting();
        }

        // МИНИ-ИГРА 2: КОСМИЧЕСКИЙ МАГНИТ (НЛО)
        function startUfoGame() {
            gameActive = true;
            score = 0;
            document.getElementById('score-counter').innerHTML = "Собрано астероидов: <span id='score'>0</span> / 30";
            document.getElementById('game-title').innerHTML = "🛸 Миссия: Космический Магнит! 🪐";
            document.getElementById('game-instruction').innerHTML = "Води пальцем по экрану — лови камни в НЛО!";
            
            document.getElementById('main-palette').style.display = 'none';
            document.getElementById('painting-canvas').style.opacity = '0';
            setTimeout(() => { document.getElementById('level-2').style.display = 'none'; }, 500);

            document.getElementById('ufo-catcher').style.display = 'block';
            document.getElementById('score-counter').style.display = 'inline-block';

            window.addEventListener('touchmove', handleUfoTouch, { passive: true });
            window.addEventListener('mousemove', handleUfoMouse);

            objectInterval = setInterval(createAsteroid, 500);
        }

        function handleUfoTouch(e) {
            moveUfo(e.touches[0].clientX);
        }
        function handleUfoMouse(e) {
            moveUfo(e.clientX);
        }

        function moveUfo(clientX) {
            let ufoX = clientX;
            if (ufoX < 40) ufoX = 40;
            if (ufoX > window.innerWidth - 40) ufoX = window.innerWidth - 40;
            document.getElementById('ufo-catcher').style.left = (ufoX - 40) + 'px';
        }

        function createAsteroid() {
            if (!gameActive) return;

            const asteroid = document.createElement('div');
            asteroid.classList.add('asteroid');

            const astColors = ['#a0a0a0', '#7a6b58', '#8b8589', '#5c5854'];
            const randColor = astColors[Math.floor(Math.random() * astColors.length)];
            
            asteroid.innerHTML = `<svg viewBox="0 0 40 40" width="100%" height="100%"><circle cx="20" cy="20" r="16" fill="${randColor}" stroke="#333" stroke-width="2"/><circle cx="13" cy="14" r="3" fill="#333" opacity="0.3"/><circle cx="26" cy="24" r="4" fill="#333" opacity="0.3"/></svg>`;
            
            const startX = Math.floor(Math.random() * (window.innerWidth - 60)) + 10;
            asteroid.style.left = startX + 'px';
            asteroid.style.animationDuration = (Math.random() * 1) + 2.5 + 's';

            document.body.appendChild(asteroid);

            const checkCollision = setInterval(() => {
                if (!asteroid.parentNode) {
                    clearInterval(checkCollision);
                    return;
                }

                const astRect = asteroid.getBoundingClientRect();
                const ufoRect = document.getElementById('ufo-catcher').getBoundingClientRect();

                if (
                    astRect.bottom >= ufoRect.top &&
                    astRect.top <= ufoRect.bottom &&
                    astRect.right >= ufoRect.left &&
                    astRect.left <= ufoRect.right
                ) {
                    asteroid.remove();
                    clearInterval(checkCollision);
                    score++;
                    document.getElementById('score').innerText = score;

                    if (score >= 30 && gameActive) {
                        endUfoGame();
                    }
                }
            }, 50);

            asteroid.addEventListener('animationend', () => {
                clearInterval(checkCollision);
                asteroid.remove();
            });
        }

        function endUfoGame() {
            gameActive = false;
            currentLevel = 3;
            clearInterval(objectInterval);
            document.querySelectorAll('.asteroid').forEach(a => a.remove());
            document.getElementById('ufo-catcher').style.display = 'none';
            document.getElementById('score-counter').style.display = 'none';

            window.removeEventListener('touchmove', handleUfoTouch);
            window.removeEventListener('mousemove', handleUfoMouse);

            document.getElementById('game-title').innerHTML = "👽 Уровень 3: Лунный Друг! 🛸";
            document.getElementById('game-instruction').innerHTML = "Путь очищен! Раскрась весёлого пришельца!";
            
            document.getElementById('level-3').style.display = 'block';
            document.getElementById('main-palette').style.display = 'flex';
            document.getElementById('painting-canvas').style.opacity = '1';

            initPainting();
        }
    </script>

</body>
</html>
