<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Волшебная Раскраска: Космическое Приключение</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .header-area {
            flex-shrink: 0;
            width: 100%;
            margin-bottom: 5px;
        }
        h1 { font-size: 20px; color: #333; margin: 5px 0 2px 0; }
        p { font-size: 13px; color: #666; margin: 0 0 5px 0; }
        
        #score-counter {
            font-size: 18px;
            font-weight: bold;
            color: #ff4d6d;
            background: white;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 5px 0;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Палитра */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            flex-shrink: 0;
            transition: opacity 0.5s ease;
        }
        .color-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.1);
            border-color: #333;
        }

        /* Холст */
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            transition: opacity 0.5s ease;
            flex-shrink: 0;
            width: 300px;
            height: 300px;
        }
        @media (min-height: 600px) { .canvas-container { width: 340px; height: 340px; } }
        @media (min-height: 700px) { .canvas-container { width: 380px; height: 380px; } }

        svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
        }
        
        .paintable {
            fill: #ffffff;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            cursor: pointer;
            transition: fill 0.2s ease;
        }

        /* Анимация уходящего кота */
        #the-cat {
            transition: transform 2.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s ease;
            transform-origin: bottom center;
        }
        .cat-walks-away {
            transform: translateX(450px) scale(0.6);
            opacity: 0;
            pointer-events: none;
        }

        /* Анимация улетающей ракеты */
        #the-rocket {
            transition: transform 2s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 1.5s ease;
            transform-origin: center center;
        }
        .rocket-flies-away {
            transform: translateY(-600px) scale(0.5);
            opacity: 0;
            pointer-events: none;
        }

        #level-2 { display: none; }

        /* ОБЩИЙ СТИЛЬ ДЛЯ ЛЕТЯЩИХ ОБЪЕКТОВ */
        .flying-object {
            position: absolute;
            cursor: pointer;
            bottom: -80px; 
            z-index: 9999;
            animation: flyUp 4s linear forwards;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        /* СЕРДЕЧКИ */
        .heart { width: 55px; height: 55px; }
        .heart::before, .heart::after {
            content: ""; position: absolute; top: 0; width: 28px; height: 45px;
            border-radius: 28px 28px 0 0; background: var(--obj-color);
        }
        .heart::before { left: 28px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        /* ЗВЁЗДОЧКИ (сделаны через встроенный SVG для идеального вида) */
        .star { width: 50px; height: 50px; }

        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-50vh) translateX(25px) rotate(8deg); }
            100% { transform: translateY(-120vh) translateX(-25px) rotate(-8deg); }
        }
        
        .flying-object.popped {
            animation: none !important;
            transform: scale(1.9) !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 id="game-title">🐱 Уровень 1: Волшебный Кот 🎨</h1>
        <p id="game-instruction">Раскрась котика полностью, чтобы открыть секретную игру!</p>
        <div id="score-counter">Поймано предметов: <span id="score">0</span> / 50</div>
    </div>

    <div class="palette" id="main-palette">
        <div class="color-circle active" style="background: #ff4d6d;" data-color="#ff4d6d"></div>
        <div class="color-circle" style="background: #ff758f;" data-color="#ff758f"></div>
        <div class="color-circle" style="background: #ff9f1c;" data-color="#ff9f1c"></div>
        <div class="color-circle" style="background: #ffeb3b;" data-color="#ffeb3b"></div>
        <div class="color-circle" style="background: #4ecc6e;" data-color="#4ecc6e"></div>
        <div class="color-circle" style="background: #20b2aa;" data-color="#20b2aa"></div>
        <div class="color-circle" style="background: #00b4d8;" data-color="#00b4d8"></div>
        <div class="color-circle" style="background: #0077b6;" data-color="#0077b6"></div>
        <div class="color-circle" style="background: #7209b7;" data-color="#7209b7"></div>
        <div class="color-circle" style="background: #b5179e;" data-color="#b5179e"></div>
        <div class="color-circle" style="background: #d4a373;" data-color="#d4a373"></div>
        <div class="color-circle" style="background: #4a4a4a;" data-color="#4a4a4a"></div>
        <div class="color-circle" style="background: #ffffff; border: 3px solid #ccc;" data-color="#ffffff"></div>
    </div>

    <div class="canvas-container" id="painting-canvas">
        
        <svg viewBox="0 0 400 400" id="level-1">
            <rect x="0" y="0" width="400" height="400" class="paintable level1-part" />
            <polygon points="60,50 65,65 80,65 67,75 72,90 60,80 48,90 53,75 40,65 55,65" class="paintable level1-part" />
            <polygon points="320,50 323,60 335,60 325,67 328,78 320,70 312,78 315,67 305,60 317,60" class="paintable level1-part" />
            <polygon points="70,160 73,168 81,168 74,173 76,182 70,176 64,182 66,173 59,168 67,168" class="paintable level1-part" />
            <circle cx="230" cy="100" r="45" class="paintable level1-part" />
            <circle cx="210" cy="85" r="7" class="paintable level1-part" />
            <circle cx="245" cy="115" r="9" class="paintable level1-part" />
            <rect x="0" y="320" width="400" height="80" class="paintable level1-part" />
            
            <g id="the-cat">
                <path d="M 130 320 C 100 320, 80 270, 100 240 C 110 230, 120 240, 115 255 C 105 275, 120 300, 145 305 Z" class="paintable cat-part" />
                <ellipse cx="180" cy="260" rx="45" ry="60" class="paintable cat-part" />
                <polygon points="145,140 130,90 165,125" class="paintable cat-part" />
                <polygon points="215,140 230,90 195,125" class="paintable cat-part" />
                <circle cx="180" cy="160" r="40" class="paintable cat-part" />
                <circle cx="165" cy="155" r="5" fill="#2c3e50" />
                <circle cx="195" cy="155" r="5" fill="#2c3e50" />
                <polygon points="180,165 176,170 184,170" fill="#ff758f" />
            </g>
        </svg>

        <svg viewBox="0 0 400 400" id="level-2">
            <rect x="0" y="0" width="400" height="400" class="paintable level2-part" />
            <circle cx="70" cy="80" r="35" class="paintable level2-part" />
            <path d="M 30 85 Q 70 105 110 85" fill="none" stroke="#2c3e50" stroke-width="3" />
            <circle cx="330" cy="300" r="25" class="paintable level2-part" />
            <polygon points="320,70 323,77 332,77 325,82 327,90 320,85 313,90 315,82 308,77 317,77" class="paintable level2-part" />
            <polygon points="80,280 83,287 92,287 85,292 87,300 80,295 73,300 75,292 68,287 77,287" class="paintable level2-part" />
            
            <g id="the-rocket">
                <path d="M 200 80 C 230 140, 240 240, 240 280 L 160 280 C 160 240, 170 140, 200 80 Z" class="paintable rocket-part" />
                <circle cx="200" cy="180" r="22" class="paintable rocket-part" />
                <path d="M 160 240 L 120 280 L 160 280 Z" class="paintable rocket-part" />
                <path d="M 240 240 L 280 280 L 240 280 Z" class="paintable rocket-part" />
                <polygon points="180,285 200,330 220,285 210,300 200,285 190,300" class="paintable rocket-part" />
            </g>
        </svg>

    </div>

    <script>
        let selectedColor = '#ff4d6d';
        let gameActive = false;
        let heartInterval;
        let score = 0;
        let currentLevel = 1;

        document.addEventListener("DOMContentLoaded", () => {
            initPalette();
            initPainting();
        });

        function initPalette() {
            const colorCircles = document.querySelectorAll('.color-circle');
            colorCircles.forEach(circle => {
                circle.addEventListener('click', (e) => {
                    colorCircles.forEach(c => c.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    selectedColor = e.currentTarget.getAttribute('data-color');
                });
            });
        }

        function initPainting() {
            const paintableElements = document.querySelectorAll('.paintable');
            paintableElements.forEach(element => {
                element.removeEventListener('click', handlePaint);
                element.addEventListener('click', handlePaint);
            });
        }

        function handlePaint(e) {
            e.preventDefault();
            e.target.style.fill = selectedColor;
            
            if (currentLevel === 1 && e.target.classList.contains('cat-part')) {
                checkCatStatus();
            } else if (currentLevel === 2) {
                checkRocketStatus();
            }
        }

        // Проверка Уровня 1 (Кот)
        function checkCatStatus() {
            const catParts = document.querySelectorAll('.cat-part');
            let allPainted = true;
            catParts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') allPainted = false;
            });

            if (allPainted) {
                setTimeout(() => {
                    document.getElementById('the-cat').classList.add('cat-walks-away');
                    setTimeout(startHeartGame, 2500);
                }, 500);
            }
        }

        // Проверка Уровня 2 (Ракета + Космос)
        function checkRocketStatus() {
            // Проверяем вообще ВСЕ детали второго уровня (и ракету, и планеты, и фон)
            const level2Parts = document.querySelectorAll('.level2-part, .rocket-part');
            let allPainted = true;
            level2Parts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') allPainted = false;
            });

            if (allPainted) {
                setTimeout(() => {
                    // Ракета улетает вверх!
                    document.getElementById('the-rocket').classList.add('rocket-flies-away');
                    
                    // Финальное поздравление через 2 секунды
                    setTimeout(() => {
                        document.getElementById('game-title').innerHTML = "🌟 КОСМИЧЕСКАЯ ПОБЕДА! 🌟";
                        document.getElementById('game-instruction').innerHTML = "Ты настоящий супер-художник! Ура-а-а!";
                    }, 2000);
                }, 500);
            }
        }

        // МИНИ-ИГРА: СЕРДЕЧКИ И ЗВЁЗДЫ
        function startHeartGame() {
            gameActive = true;
            score = 0;
            document.getElementById('score').innerText = score;
            
            document.getElementById('game-title').innerHTML = "❤️ Поймай 50 звёзд и сердечек! ✨";
            document.getElementById('game-instruction').innerHTML = "Тапай по ним быстрее!";
            
            const counterDiv = document.getElementById('score-counter');
            counterDiv.style.display = 'inline-block';
            setTimeout(() => counterDiv.style.opacity = '1', 50);

            document.getElementById('main-palette').style.opacity = '0';
            document.getElementById('painting-canvas').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-palette').style.display = 'none';
                document.getElementById('level-1').style.display = 'none';
            }, 500);

            // Запускаем генератор случайных объектов
            heartInterval = setInterval(createFlyingObject, 350);
        }

        function createFlyingObject() {
            if (!gameActive) return;

            const isStar = Math.random() > 0.5; // 50% шанс, что полетит звезда, 50% — сердечко
            const obj = document.createElement('div');
            obj.classList.add('flying-object');

            const colors = ['#ff4d6d', '#ff758f', '#ffeb3b', '#ff9f1c', '#ba55d3', '#00b4d8', '#4ecc6e'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            if (isStar) {
                // Если летит звезда
                obj.classList.add('star');
                // Вставляем красивую SVG звёздочку внутрь дива
                obj.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="${randomColor}" stroke="#fff" stroke-width="1"/></svg>`;
            } else {
                // Если летит сердечко
                obj.classList.add('heart');
                obj.style.setProperty('--obj-color', randomColor);
            }

            const randomX = Math.floor(Math.random() * 80) + 5;
            obj.style.left = randomX + '%';

            const randomScale = (Math.random() * 0.4) + 0.7; 
            obj.style.transform = `scale(${randomScale})`;

            const randomDuration = (Math.random() * 1.5) + 2.3;
            obj.style.animationDuration = randomDuration + 's';

            const popEvent = (e) => {
                e.preventDefault();
                e.stopPropagation();
                obj.classList.add('popped');
                
                score++;
                document.getElementById('score').innerText = score;

                if (score >= 50 && gameActive) {
                    endHeartGame();
                }

                setTimeout(() => { obj.remove(); }, 200);
            };

            obj.addEventListener('mousedown', popEvent);
            obj.addEventListener('touchstart', popEvent, { passive: false });
            obj.addEventListener('animationend', () => { obj.remove(); });

            document.body.appendChild(obj);
        }

        // ПЕРЕХОД НА УРОВЕНЬ 2
        function endHeartGame() {
            gameActive = false;
            currentLevel = 2;
            clearInterval(heartInterval);
            document.querySelectorAll('.flying-object').forEach(o => o.remove());

            document.getElementById('game-title').innerHTML = "🚀 Уровень 2: Ракета! 🌟";
            document.getElementById('game-instruction').innerHTML = "Раскрась ракету и планеты, чтобы запустить её в космос!";
            
            document.getElementById('score-counter').style.display = 'none';
            document.getElementById('level-2').style.display = 'block';
            document.getElementById('main-palette').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('main-palette').style.opacity = '1';
                document.getElementById('painting-canvas').style.opacity = '1';
            }, 50);

            initPainting();
        }
    </script>

</body>
</html>
