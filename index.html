<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебная Раскраска: Уровни</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-top: 0; margin-bottom: 20px; }
        
        /* Счётчик сердечек */
        #score-counter {
            display: none;
            font-size: 24px;
            font-weight: bold;
            color: #ff4d6d;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Палитра */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 550px;
            margin: 0 auto 20px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: opacity 0.5s ease;
        }
        .color-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.1);
            border-color: #333;
        }

        /* Холст раскраски */
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            transition: opacity 0.8s ease;
        }
        svg {
            width: 100%;
            max-width: 420px;
            height: auto;
            display: block;
            border-radius: 10px;
        }
        
        .paintable {
            fill: #ffffff;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            cursor: pointer;
            transition: fill 0.2s ease;
        }
        .paintable:hover {
            filter: brightness(0.97);
        }

        /* Анимация кота */
        #the-cat {
            transition: transform 2.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s ease;
            transform-origin: bottom center;
        }
        .cat-walks-away {
            transform: translateX(450px) scale(0.6);
            opacity: 0;
            pointer-events: none;
        }

        /* Скрытые элементы по умолчанию (Уровень 2) */
        #level-2 {
            display: none;
        }

        /* Сердечки */
        .heart {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
            bottom: -80px; 
            z-index: 9999;
            animation: flyUp 4s linear forwards;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 32px;
            height: 50px;
            border-radius: 32px 32px 0 0;
            background: var(--heart-color);
        }
        .heart::before { left: 32px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-50vh) translateX(30px) rotate(8deg); }
            100% { transform: translateY(-120vh) translateX(-30px) rotate(-8deg); }
        }

        .heart.popped {
            animation: none !important;
            transform: scale(1.8) !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <h1 id="game-title">🐱 Уровень 1: Волшебный Кот 🎨</h1>
    <p id="game-instruction">Раскрась котика полностью, чтобы открыть секретную игру!</p>

    <div id="score-counter">Поймано сердечек: <span id="score">0</span> / 50</div>

    <div class="palette" id="main-palette">
        <div class="color-circle active" style="background: #ff4d6d;" data-color="#ff4d6d"></div>
        <div class="color-circle" style="background: #ff758f;" data-color="#ff758f"></div>
        <div class="color-circle" style="background: #ff9f1c;" data-color="#ff9f1c"></div>
        <div class="color-circle" style="background: #ffeb3b;" data-color="#ffeb3b"></div>
        <div class="color-circle" style="background: #4ecc6e;" data-color="#4ecc6e"></div>
        <div class="color-circle" style="background: #20b2aa;" data-color="#20b2aa"></div>
        <div class="color-circle" style="background: #00b4d8;" data-color="#00b4d8"></div>
        <div class="color-circle" style="background: #0077b6;" data-color="#0077b6"></div>
        <div class="color-circle" style="background: #7209b7;" data-color="#7209b7"></div>
        <div class="color-circle" style="background: #b5179e;" data-color="#b5179e"></div>
        <div class="color-circle" style="background: #d4a373;" data-color="#d4a373"></div>
        <div class="color-circle" style="background: #4a4a4a;" data-color="#4a4a4a"></div>
        <div class="color-circle" style="background: #ffffff; border: 3px solid #ccc;" data-color="#ffffff"></div>
    </div>

    <div class="canvas-container" id="painting-canvas">
        
        <svg viewBox="0 0 400 400" id="level-1">
            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <polygon points="60,50 65,65 80,65 67,75 72,90 60,80 48,90 53,75 40,65 55,65" class="paintable" />
            <polygon points="320,50 323,60 335,60 325,67 328,78 320,70 312,78 315,67 305,60 317,60" class="paintable" />
            <polygon points="70,160 73,168 81,168 74,173 76,182 70,176 64,182 66,173 59,168 67,168" class="paintable" />
            <circle cx="230" cy="100" r="45" class="paintable" />
            <circle cx="210" cy="85" r="7" class="paintable" />
            <circle cx="245" cy="115" r="9" class="paintable" />
            <rect x="0" y="320" width="400" height="80" class="paintable" />
            
            <g id="the-cat">
                <path d="M 130 320 C 100 320, 80 270, 100 240 C 110 230, 120 240, 115 255 C 105 275, 120 300, 145 305 Z" class="paintable cat-part" />
                <ellipse cx="180" cy="260" rx="45" ry="60" class="paintable cat-part" />
                <polygon points="145,140 130,90 165,125" class="paintable cat-part" />
                <polygon points="215,140 230,90 195,125" class="paintable cat-part" />
                <circle cx="180" cy="160" r="40" class="paintable cat-part" />
                <circle cx="165" cy="155" r="5" fill="#2c3e50" />
                <circle cx="195" cy="155" r="5" fill="#2c3e50" />
                <polygon points="180,165 176,170 184,170" fill="#ff758f" />
            </g>
        </svg>

        <svg viewBox="0 0 400 400" id="level-2">
            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <circle cx="70" cy="80" r="35" class="paintable" />
            <path d="M 30 85 Q 70 105 110 85" fill="none" stroke="#2c3e50" stroke-width="3" /> <circle cx="330" cy="300" r="25" class="paintable" />
            <polygon points="320,70 323,77 332,77 325,82 327,90 320,85 313,90 315,82 308,77 317,77" class="paintable" />
            <polygon points="80,280 83,287 92,287 85,292 87,300 80,295 73,300 75,292 68,287 77,287" class="paintable" />
            
            <path d="M 200 80 C 230 140, 240 240, 240 280 L 160 280 C 160 240, 170 140, 200 80 Z" class="paintable" />
            <circle cx="200" cy="180" r="22" class="paintable" />
            <path d="M 160 240 L 120 280 L 160 280 Z" class="paintable" />
            <path d="M 240 240 L 280 280 L 240 280 Z" class="paintable" />
            <polygon points="180,285 200,330 220,285 210,300 200,285 190,300" class="paintable" />
        </svg>

    </div>

    <script>
        let selectedColor = '#ff4d6d';
        let gameActive = false;
        let heartInterval;
        let score = 0;

        // Выбор цвета в палитре
        const colorCircles = document.querySelectorAll('.color-circle');
        colorCircles.forEach(circle => {
            circle.addEventListener('click', (e) => {
                colorCircles.forEach(c => c.classList.remove('active'));
                e.currentTarget.classList.add('active');
                selectedColor = e.currentTarget.getAttribute('data-color');
            });
        });

        // Функция покраски элементов (работает для обеих картинок)
        function initPainting() {
            const paintableElements = document.querySelectorAll('.paintable');
            paintableElements.forEach(element => {
                // Сначала убираем старый слушатель, чтобы не дублировать
                element.removeEventListener('click', handlePaint);
                element.addEventListener('click', handlePaint);
            });
        }

        function handlePaint(e) {
            e.target.style.fill = selectedColor;
            if (e.target.classList.contains('cat-part')) {
                checkCatStatus();
            }
        }

        // Запуск при старте страницы
        initPainting();

        // Проверка готовности кота (Уровень 1)
        function checkCatStatus() {
            const catParts = document.querySelectorAll('.cat-part');
            let allPainted = true;

            catParts.forEach(part => {
                let currentFill = window.getComputedStyle(part).fill;
                if (currentFill === 'rgb(255, 255, 255)' || currentFill === '#ffffff') {
                    allPainted = false;
                }
            });

            if (allPainted) {
                setTimeout(() => {
                    const catGroup = document.getElementById('the-cat');
                    catGroup.classList.add('cat-walks-away');
                    setTimeout(startHeartGame, 2500);
                }, 500);
            }
        }

        // СТАДИЯ 2: ИГРА В СЕРДЕЧКИ
        function startHeartGame() {
            gameActive = true;
            score = 0;
            document.getElementById('score').innerText = score;
            
            document.getElementById('game-title').innerHTML = "❤️ Поймай 50 сердечек! ✨";
            document.getElementById('game-instruction').innerHTML = "Лопай сердечки тапами, чтобы открыть супер-уровень!";
            
            // Показываем счетчик
            const counterDiv = document.getElementById('score-counter');
            counterDiv.style.opacity = '1';

            // Прячем палитру и раскраску кота
            document.getElementById('main-palette').style.opacity = '0';
            document.getElementById('painting-canvas').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-palette').style.display = 'none';
                document.getElementById('level-1').style.display = 'none'; // Отключаем кота
            }, 600);

            // Интервал вылета сердечек
            heartInterval = setInterval(createHeart, 400);
        }

        // Отрисовка летящего сердечка
        function createHeart() {
            if (!gameActive) return;

            const heart = document.createElement('div');
            heart.classList.add('heart');

            const colors = ['#ff4d6d', '#ff758f', '#ff1493', '#ff69b4', '#ba55d3', '#ff4500', '#ff85a2'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            heart.style.setProperty('--heart-color', randomColor);

            const randomX = Math.floor(Math.random() * 80) + 5;
            heart.style.left = randomX + '%';

            const randomScale = (Math.random() * 0.5) + 0.7; 
            heart.style.transform = `scale(${randomScale})`;

            const randomDuration = (Math.random() * 2) + 2.5; // Чуть быстрее летят
            heart.style.animationDuration = randomDuration + 's';

            // Клик по сердечку
            const popEvent = (e) => {
                e.preventDefault();
                e.stopPropagation();
                heart.classList.add('popped');
                
                // Начисляем очки
                score++;
                document.getElementById('score').innerText = score;

                // ПРОВЕРКА ПОБЕДЫ: Набрали 50 очков?
                if (score >= 50 && gameActive) {
                    endHeartGame();
                }

                setTimeout(() => { heart.remove(); }, 200);
            };

            heart.addEventListener('mousedown', popEvent);
            heart.addEventListener('touchstart', popEvent, { passive: false });
            heart.addEventListener('animationend', () => { heart.remove(); });

            document.body.appendChild(heart);
        }

        // СТАДИЯ 3: ПЕРЕХОД НА ВТОРОЙ УРОВЕНЬ
        function endHeartGame() {
            gameActive = false;
            clearInterval(heartInterval); // Стоп вылету сердечек
            
            // Удаляем все оставшиеся на экране сердечки
            document.querySelectorAll('.heart').forEach(h => h.remove());

            // Меняем интерфейс на Космический уровень
            document.getElementById('game-title').innerHTML = "🚀 Уровень 2: Ракета в космосе! 🌟";
            document.getElementById('game-instruction').innerHTML = "Ура! Ты собрал все сердечки! Раскрась космический корабль!";
            
            // Прячем счётчик
            document.getElementById('score-counter').style.display = 'none';

            // Включаем вторую раскраску
            document.getElementById('level-2').style.display = 'block';
            
            // Плавно возвращаем холст и палитру
            document.getElementById('main-palette').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('main-palette').style.opacity = '1';
                document.getElementById('painting-canvas').style.opacity = '1';
            }, 100);

            // Переинициализируем покраску для новых элементов ракеты
            initPainting();
        }
    </script>

</body>
</html>
