<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебная Раскраска</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        /* Палитра цветов */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 550px;
            margin: 0 auto 20px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .color-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.1);
            border-color: #333;
        }

        /* Холст */
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        svg {
            width: 100%;
            max-width: 420px;
            height: auto;
            display: block;
            border-radius: 10px;
        }
        
        /* Элементы для покраски */
        .paintable {
            fill: #ffffff;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            cursor: pointer;
            transition: fill 0.2s ease;
        }
        .paintable:hover {
            filter: brightness(0.97);
        }
    </style>
</head>
<body>

    <h1>🐱 Волшебная Раскраска 🎨</h1>
    <p>Нажми на цвет, а потом на котика, луну или небо!</p>

    <div class="palette">
        <div class="color-circle active" style="background: #ff4d6d;" data-color="#ff4d6d"></div>
        <div class="color-circle" style="background: #ff758f;" data-color="#ff758f"></div>
        <div class="color-circle" style="background: #ff9f1c;" data-color="#ff9f1c"></div>
        <div class="color-circle" style="background: #ffeb3b;" data-color="#ffeb3b"></div>
        <div class="color-circle" style="background: #4ecc6e;" data-color="#4ecc6e"></div>
        <div class="color-circle" style="background: #20b2aa;" data-color="#20b2aa"></div>
        <div class="color-circle" style="background: #00b4d8;" data-color="#00b4d8"></div>
        <div class="color-circle" style="background: #0077b6;" data-color="#0077b6"></div>
        <div class="color-circle" style="background: #7209b7;" data-color="#7209b7"></div>
        <div class="color-circle" style="background: #b5179e;" data-color="#b5179e"></div>
        <div class="color-circle" style="background: #d4a373;" data-color="#d4a373"></div>
        <div class="color-circle" style="background: #4a4a4a;" data-color="#4a4a4a"></div>
        <div class="color-circle" style="background: #a0a0a0;" data-color="#a0a0a0"></div>
        <div class="color-circle" style="background: #ffffff; border: 3px solid #ccc;" data-color="#ffffff"></div>
    </div>

    <div class="canvas-container">
        <svg viewBox="0 0 400 400">
            <!-- БОЛЬШОЙ ФОН (НЕБО) -->
            <rect x="0" y="0" width="400" height="400" class="paintable" />

            <!-- ЗВЁЗДЫ -->
            <polygon points="60,50 65,65 80,65 67,75 72,90 60,80 48,90 53,75 40,65 55,65" class="paintable" />
            <polygon points="320,50 323,60 335,60 325,67 328,78 320,70 312,78 315,67 305,60 317,60" class="paintable" />
            <polygon points="70,160 73,168 81,168 74,173 76,182 70,176 64,182 66,173 59,168 67,168" class="paintable" />

            <!-- ЛУНА -->
            <circle cx="230" cy="100" r="45" class="paintable" />
            <!-- Кратеры внутри луны -->
            <circle cx="210" cy="85" r="7" class="paintable" />
            <circle cx="245" cy="115" r="9" class="paintable" />

            <!-- ЗАБОР -->
            <rect x="0" y="320" width="400" height="80" class="paintable" />
            
            <!-- КОТИК -->
            <!-- Хвост -->
            <path d="M 130 320 C 100 320, 80 270, 100 240 C 110 230, 120 240, 115 255 C 105 275, 120 300, 145 305 Z" class="paintable" />
            <!-- Тело -->
            <ellipse cx="180" cy="260" rx="45" ry="60" class="paintable" />
            <!-- Голова -->
            <circle cx="180" cy="160" r="40" class="paintable" />
            <!-- Левое ухо -->
            <polygon points="145,140 130,90 165,125" class="paintable" />
            <!-- Правое ухо -->
            <polygon points="215,140 230,90 195,125" class="paintable" />
            <!-- Левый глаз -->
            <circle cx="165" cy="155" r="5" fill="#2c3e50" />
            <!-- Правый глаз -->
            <circle cx="195" cy="155" r="5" fill="#2c3e50" />
            <!-- Носик -->
            <polygon points="180,165 176,170 184,170" fill="#ff758f" />
        </svg>
    </div>

    <script>
        // Переменная хранeния текущего цвета
        let selectedColor = '#ff4d6d';

        // Логика выбора цвета на палитре
        const colorCircles = document.querySelectorAll('.color-circle');
        colorCircles.forEach(circle => {
            circle.addEventListener('click', (e) => {
                colorCircles.forEach(c => c.classList.remove('active'));
                e.currentTarget.classList.add('active');
                selectedColor = e.currentTarget.getAttribute('data-color');
            });
        });

        // Логика покраски элементов
        const paintableElements = document.querySelectorAll('.paintable');
        paintableElements.forEach(element => {
            element.addEventListener('click', (e) => {
                // Красим именно тот элемент, на который кликнули
                e.target.style.fill = selectedColor;
            });
        });
    </script>

</body>
</html>
