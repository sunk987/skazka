<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Волшебная Раскраска: Космические Миссии</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .header-area {
            flex-shrink: 0;
            width: 100%;
            margin-bottom: 5px;
            z-index: 10;
        }
        h1 { font-size: 20px; color: #333; margin: 5px 0 2px 0; }
        p { font-size: 13px; color: #666; margin: 0 0 5px 0; }
        
        #score-counter {
            font-size: 18px;
            font-weight: bold;
            color: #ff4d6d;
            background: white;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 5px 0;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Палитра */
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            flex-shrink: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        .color-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .color-circle:hover, .color-circle.active {
            transform: scale(1.1);
            border-color: #333;
        }

        /* Холст раскрасок */
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            flex-shrink: 0;
            width: 300px;
            height: 300px;
            transition: opacity 0.5s ease;
        }
        @media (min-height: 600px) { .canvas-container { width: 340px; height: 340px; } }
        @media (min-height: 700px) { .canvas-container { width: 380px; height: 380px; } }

        svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
        }
        
        .paintable {
            fill: #ffffff;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            cursor: pointer;
            transition: fill 0.2s ease;
        }

        /* Анимации улетания */
        #the-cat {
            transition: transform 2.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s ease;
            transform-origin: bottom center;
        }
        .cat-walks-away { transform: translateX(450px) scale(0.6); opacity: 0; pointer-events: none; }

        #the-rocket {
            transition: transform 2s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 1.5s ease;
            transform-origin: center center;
        }
        .rocket-flies-away { transform: translateY(-600px) scale(0.5); opacity: 0; pointer-events: none; }

        #level-2, #level-3 { display: none; }

        /* МИНИ-ИГРА 1: СЕРДЕЧКИ */
        .flying-object {
            position: absolute; cursor: pointer; bottom: -80px; z-index: 5;
            animation: flyUp 4s linear forwards; transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .heart { width: 55px; height: 55px; }
        .heart::before, .heart::after {
            content: ""; position: absolute; top: 0; width: 28px; height: 45px;
            border-radius: 28px 28px 0 0; background: var(--obj-color);
        }
        .heart::before { left: 28px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
        .star { width: 50px; height: 50px; }

        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-50vh) translateX(25px) rotate(8deg); }
            100% { transform: translateY(-120vh) translateX(-25px) rotate(-8deg); }
        }
        .flying-object.popped { animation: none !important; transform: scale(1.9) !important; opacity: 0 !important; pointer-events: none !important; }

        /* МИНИ-ИГРА 2: МАГНИТ */
        #ufo-catcher {
            position: absolute; width: 80px; height: 50px;
            bottom: 40px; left: calc(50% - 40px); z-index: 99;
            display: none; pointer-events: none;
            transition: transform 0.1s linear;
        }
        .asteroid {
            position: absolute; width: 40px; height: 40px; z-index: 98;
            animation: fallDown 3.5s linear forwards;
        }
        @keyframes fallDown {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>

        </svg>

            <rect x="0" y="0" width="400" height="400" class="paintable" />
            <circle cx="70"
